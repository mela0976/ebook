<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>電子書瀏覽器</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/reader.css">
  <link rel="stylesheet" href="css/annotations.css">
  <link rel="stylesheet" href="css/signature.css">
</head>
<body>
  <!-- 工具列 -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar-group">
      <button class="tool-btn" id="btn-pen" data-tool="pen" title="畫筆">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" id="btn-highlighter" data-tool="highlighter" title="螢光筆">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 14l3 3v5h6v-5l3-3V9H6v5zm2-3h8v2.17l-3 3V19h-2v-2.83l-3-3V11zm4-10h2v3h-2V1zm6.31 4.28l1.42 1.42-2.13 2.12-1.42-1.41 2.13-2.13zM4.27 5.28L6.4 7.4 4.98 8.82 2.86 6.7l1.41-1.42z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" id="btn-eraser" data-tool="eraser" title="橡皮擦">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.01 4.01 0 01-5.66 0L2.81 17c-.78-.79-.78-2.05 0-2.84l10.6-10.6c.79-.78 2.05-.78 2.83 0zM4.22 15.58l3.54 3.53c.78.79 2.04.79 2.83 0l3.53-3.53-4.95-4.95-4.95 4.95z" fill="currentColor"/></svg>
      </button>
    </div>

    <div class="toolbar-group">
      <div class="color-picker-wrap">
        <button class="tool-btn color-swatch" id="btn-color" title="顏色選擇">
          <span class="swatch" id="current-swatch"></span>
        </button>
        <div class="color-panel" id="color-panel">
          <button class="color-opt" data-color="#e53935" style="background:#e53935"></button>
          <button class="color-opt" data-color="#1e88e5" style="background:#1e88e5"></button>
          <button class="color-opt" data-color="#43a047" style="background:#43a047"></button>
          <button class="color-opt" data-color="#fb8c00" style="background:#fb8c00"></button>
          <button class="color-opt" data-color="#8e24aa" style="background:#8e24aa"></button>
          <button class="color-opt" data-color="#000000" style="background:#000000"></button>
          <button class="color-opt" data-color="#ffeb3b" style="background:#ffeb3b"></button>
          <button class="color-opt" data-color="#ffffff" style="background:#ffffff;border:1px solid #ccc"></button>
        </div>
      </div>
    </div>

    <div class="toolbar-group">
      <button class="tool-btn" id="btn-signature" data-tool="signature" title="簽名">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M2 20h20v2H2v-2zm1.5-7.5c0-.28.22-.5.5-.5s.5.22.5.5-.22.5-.5.5-.5-.22-.5-.5zM7 6l-1.41 1.41L7 8.83l4.59-4.59L10.17 2.83 7 6zm9 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-2.5 5.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5-.67-1.5-1.5-1.5-1.5.67-1.5 1.5z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" id="btn-clear-page" title="清除本頁註解">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="currentColor"/></svg>
      </button>
    </div>

    <div class="toolbar-group nav-group">
      <button class="tool-btn" id="btn-prev" title="上一頁">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/></svg>
      </button>
      <span class="page-indicator" id="page-indicator">1 / 1</span>
      <button class="tool-btn" id="btn-next" title="下一頁">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <!-- 頁面容器 -->
  <div class="reader-container" id="reader-container">
    <div class="page-wrapper" id="page-wrapper">
      <div class="page-content" id="page-content"></div>
      <canvas class="annotation-canvas" id="annotation-canvas"></canvas>
    </div>
  </div>

  <!-- 簽名 Modal -->
  <div class="signature-modal" id="signature-modal">
    <div class="signature-panel">
      <h3 class="signature-title">手寫簽名</h3>
      <canvas class="signature-canvas" id="signature-canvas" width="600" height="200"></canvas>
      <div class="signature-actions">
        <button class="sig-btn sig-btn-cancel" id="sig-cancel">取消</button>
        <button class="sig-btn sig-btn-clear" id="sig-clear">清除</button>
        <button class="sig-btn sig-btn-confirm" id="sig-confirm">確認</button>
      </div>
    </div>
  </div>

  <!-- 簽名放置預覽 -->
  <div class="signature-placer" id="signature-placer" style="display:none">
    <img class="signature-preview" id="signature-preview" alt="簽名預覽">
    <div class="placer-actions">
      <button class="sig-btn sig-btn-cancel" id="placer-cancel">取消</button>
      <button class="sig-btn sig-btn-confirm" id="placer-confirm">確認放置</button>
    </div>
  </div>

  <script defer src="js/storage.js"></script>
  <script defer src="js/pointer.js"></script>
  <script defer src="js/reader.js"></script>
  <script defer src="js/annotations.js"></script>
  <script defer src="js/signature.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
